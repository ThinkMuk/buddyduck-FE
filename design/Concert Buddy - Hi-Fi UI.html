document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Concert Buddy — Hi-Fi UI (CB-01 → CB-14′)<\u002Ftitle>\n<style>\n/* ============================================================\n   CONCERT BUDDY — Design Tokens (Buddy Duck · dark · yellow)\n   ============================================================ */\n:root{\n  /* surfaces — warm-neutral near-blacks */\n  --cb-stage:#070708;        /* canvas behind devices */\n  --cb-bg:#0E0E10;           /* app background */\n  --cb-surface-1:#161618;    /* elevated card */\n  --cb-surface-2:#1E1E22;    /* inputs / secondary card */\n  --cb-surface-3:#27272C;    /* chips / hover / avatar */\n  --cb-line:rgba(255,255,255,.07);\n  --cb-line-2:rgba(255,255,255,.13);\n\n  /* brand */\n  --cb-yellow:#FDBE0D;\n  --cb-yellow-2:#FFD23F;\n  --cb-yellow-dim:rgba(253,190,13,.13);\n  --cb-yellow-line:rgba(253,190,13,.40);\n  --cb-on-yellow:#1C1A12;\n\n  /* text */\n  --cb-text:#FDFCFD;\n  --cb-text-2:#A6A6AD;\n  --cb-text-3:#6C6C74;\n\n  --cb-danger:#FF6B5B;\n\n  /* radii */\n  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:24px; --r-pill:999px;\n\n  /* shadow */\n  --sh-card:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px -12px rgba(0,0,0,.7);\n  --sh-pop:0 24px 60px -20px rgba(0,0,0,.85);\n  --sh-glow:0 6px 22px -6px rgba(253,190,13,.45);\n\n  --font:-apple-system,BlinkMacSystemFont,\"Apple SD Gothic Neo\",\"Pretendard\",\"Noto Sans KR\",\"Helvetica Neue\",Helvetica,Arial,sans-serif;\n  --mono:ui-monospace,SFMono-Regular,\"SF Mono\",Menlo,monospace;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{background:var(--cb-stage);font-family:var(--font);color:var(--cb-text);\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n\n/* ---------------- Canvas / document chrome ---------------- */\n.canvas{min-height:100vh;padding:40px 44px 120px;\n  background:\n    radial-gradient(900px 540px at 22% -8%, rgba(253,190,13,.10), transparent 60%),\n    radial-gradient(700px 480px at 100% 4%, rgba(253,190,13,.05), transparent 55%),\n    var(--cb-stage);\n  overflow-x:auto}\n.doc-head{display:flex;align-items:center;gap:16px;margin:4px 0 38px;flex-wrap:wrap}\n.doc-mark{width:50px;height:50px;border-radius:14px;flex:0 0 auto;\n  box-shadow:0 8px 24px -8px rgba(253,190,13,.5);background-size:cover}\n.doc-head .tt{font-size:21px;font-weight:700;letter-spacing:-.01em}\n.doc-head .tt b{color:var(--cb-yellow)}\n.doc-head .sb{font-size:12.5px;color:var(--cb-text-2);margin-top:3px;line-height:1.5;max-width:640px}\n.doc-head .badge{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}\n.doc-head .pill{font-size:11px;color:var(--cb-text-2);border:1px solid var(--cb-line-2);\n  border-radius:var(--r-pill);padding:6px 12px;display:inline-flex;align-items:center;gap:6px}\n.doc-head .pill i{width:9px;height:9px;border-radius:3px;display:inline-block}\n.sw-black{background:#1D1C1D;border:1px solid var(--cb-line-2)} .sw-yellow{background:var(--cb-yellow)}\n.sw-white{background:var(--cb-text)}\n\n.section-band{display:flex;align-items:baseline;gap:14px;margin:46px 0 22px;flex-wrap:wrap}\n.section-band .ix{font-size:11px;letter-spacing:.16em;font-weight:700;color:var(--cb-yellow);\n  border:1px solid var(--cb-yellow-line);padding:4px 10px;border-radius:var(--r-pill);text-transform:uppercase;background:var(--cb-yellow-dim)}\n.section-band .name{font-size:18px;font-weight:700;letter-spacing:-.01em}\n.section-band .desc{font-size:12px;color:var(--cb-text-3);line-height:1.45}\n\n.flow-row{display:flex;flex-wrap:wrap;gap:56px 40px}\n\n.flow-callout{display:flex;align-items:center;gap:14px;flex-wrap:wrap;\n  margin:6px 0 8px;padding:14px 18px;border:1px solid var(--cb-line);background:var(--cb-surface-1);\n  border-radius:var(--r-md);max-width:1640px}\n.flow-callout .lbl{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;\n  color:var(--cb-yellow);background:var(--cb-yellow-dim);border:1px solid var(--cb-yellow-line);\n  padding:4px 9px;border-radius:var(--r-pill)}\n.flow-callout .seq{font-size:12px;color:var(--cb-text-2);display:flex;align-items:center;gap:7px;flex-wrap:wrap}\n.flow-callout .seq b{color:var(--cb-text);font-weight:600}\n.flow-callout .seq i{font-style:italic;color:var(--cb-text-3)}\n.flow-callout .arr{width:14px;height:1px;background:var(--cb-line-2);position:relative}\n.flow-callout .arr::after{content:\"\";position:absolute;right:0;top:-2px;width:5px;height:5px;\n  border-top:1px solid var(--cb-line-2);border-right:1px solid var(--cb-line-2);transform:rotate(45deg)}\n\n/* ---------------- Frame ---------------- */\n.frame-col{display:flex;flex-direction:column;flex:0 0 auto;width:375px}\n.frame-label{font-size:10.5px;color:var(--cb-yellow);margin-bottom:3px;font-weight:700;letter-spacing:.08em}\n.frame-label .legacy{color:var(--cb-text-3);font-weight:500;margin-left:6px;letter-spacing:0}\n.frame-title{font-size:14px;color:var(--cb-text);margin-bottom:16px;font-weight:600}\n\n.device{width:375px;height:812px;border-radius:46px;position:relative;flex:0 0 auto;\n  background:linear-gradient(#202024,#0c0c0d);padding:5px;\n  box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 40px 80px -30px rgba(0,0,0,.9), var(--sh-glow)}\n.screen{width:100%;height:100%;border-radius:42px;overflow:hidden;position:relative;\n  background:var(--cb-bg);display:flex;flex-direction:column}\n.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:108px;height:30px;\n  background:#000;border-radius:var(--r-pill);z-index:40}\n\n.caption{font-size:11.5px;color:var(--cb-text-3);margin-top:14px;max-width:340px;line-height:1.6}\n.caption .ann{color:var(--cb-yellow);font-weight:600}\n.caption strong{color:var(--cb-text-2);font-weight:600}\n\n/* ---------------- Icons ---------------- */\n.ic{width:20px;height:20px;display:inline-block;flex:0 0 auto;stroke:currentColor;stroke-width:1.8;\n  fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}\n.ic.sm{width:15px;height:15px;stroke-width:2}\n.ic.lg{width:24px;height:24px}\n.ic.fill{fill:currentColor;stroke:none}\n\n/* ---------------- Status bar ---------------- */\n.statusbar{height:50px;display:flex;align-items:flex-end;justify-content:space-between;\n  padding:0 26px 7px;flex:0 0 auto;position:relative;z-index:30}\n.statusbar .time{font-size:14px;font-weight:600;letter-spacing:.01em}\n.statusbar .sysic{display:flex;align-items:center;gap:6px;color:var(--cb-text)}\n.statusbar .sysic .ic{width:17px;height:17px}\n\n/* ---------------- App bar ---------------- */\n.appbar{height:52px;display:flex;align-items:center;gap:8px;padding:0 14px;flex:0 0 auto;position:relative}\n.appbar .title-c{position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:600;\n  max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}\n.appbar .title-l{font-size:21px;font-weight:700;letter-spacing:-.02em}\n.appbar .right{display:flex;gap:8px;margin-left:auto;align-items:center}\n.iconbtn{width:38px;height:38px;border-radius:50%;background:var(--cb-surface-2);border:1px solid var(--cb-line);\n  color:var(--cb-text);display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;position:relative;\n  cursor:pointer;transition:background .15s}\n.iconbtn:hover{background:var(--cb-surface-3)}\n.iconbtn .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;\n  background:var(--cb-yellow);border:2px solid var(--cb-bg)}\n.text-action{font-size:13px;color:var(--cb-yellow);font-weight:600;background:none;border:0;padding:4px 6px;cursor:pointer}\n.chat-pill{height:34px;border-radius:var(--r-pill);background:var(--cb-yellow);color:var(--cb-on-yellow);\n  border:0;padding:0 13px 0 11px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;cursor:pointer}\n.chat-pill .ic{width:15px;height:15px;stroke-width:2}\n\n/* ---------------- Body / scroll ---------------- */\n.body{flex:1 1 auto;overflow:hidden;display:flex;flex-direction:column;position:relative;min-height:0}\n.scroll{flex:1 1 auto;overflow:auto;padding:2px 16px 18px}\n.scroll::-webkit-scrollbar{width:0}\n.sec-title{font-size:15px;font-weight:700;letter-spacing:-.01em;padding:0 16px;margin:18px 0 12px;flex:0 0 auto}\n.sec-lbl{font-size:10.5px;color:var(--cb-text-3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;\n  margin:18px 16px 10px}\n.hint{font-size:11.5px;color:var(--cb-text-3);line-height:1.55}\n\n/* ---------------- Search ---------------- */\n.search{margin:8px 16px 4px;height:46px;border-radius:var(--r-md);background:var(--cb-surface-2);\n  border:1px solid var(--cb-line);display:flex;align-items:center;gap:10px;padding:0 14px;\n  color:var(--cb-text-3);font-size:13.5px;flex:0 0 auto}\n.search .ic{color:var(--cb-text-3);width:18px;height:18px}\n\n/* ---------------- Chips ---------------- */\n.chips{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;flex:0 0 auto}\n.chips.wrap{flex-wrap:wrap;overflow:visible;padding:0}\n.chip{height:34px;border-radius:var(--r-pill);padding:0 14px;display:inline-flex;align-items:center;gap:5px;\n  font-size:12.5px;font-weight:500;color:var(--cb-text-2);background:var(--cb-surface-2);\n  border:1px solid var(--cb-line);white-space:nowrap;flex:0 0 auto;cursor:pointer;transition:.15s}\n.chip:hover{border-color:var(--cb-line-2)}\n.chip.active{background:var(--cb-yellow);color:var(--cb-on-yellow);border-color:var(--cb-yellow);font-weight:700}\n.chip .ic{width:13px;height:13px}\n\n/* ---------------- Image placeholders ---------------- */\n.ph{position:relative;overflow:hidden;background:linear-gradient(135deg,#232327,#141416);flex:0 0 auto}\n.ph::before{content:\"\";position:absolute;inset:0;\n  background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.022) 0 1px,transparent 1px 10px)}\n.ph[data-tag]::after{content:attr(data-tag);position:absolute;left:9px;bottom:8px;font:600 9px/1 var(--mono);\n  letter-spacing:.06em;color:rgba(255,255,255,.34)}\n.ph.glow::before{background-image:\n  radial-gradient(120px 80px at 80% 20%,rgba(253,190,13,.18),transparent 70%),\n  repeating-linear-gradient(135deg,rgba(255,255,255,.022) 0 1px,transparent 1px 10px)}\n\n/* ---------------- Avatar ---------------- */\n.av{width:36px;height:36px;border-radius:50%;background:var(--cb-surface-3);border:1px solid var(--cb-line);\n  display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--cb-text-2);\n  flex:0 0 auto;text-transform:uppercase}\n.av.sm{width:28px;height:28px;font-size:11px}\n.av.lg{width:46px;height:46px;font-size:16px}\n.av.host{border-color:var(--cb-yellow);color:var(--cb-yellow);box-shadow:0 0 0 1px var(--cb-yellow-line)}\n.av-stack{display:flex}.av-stack .av{margin-right:-8px;border:2px solid var(--cb-surface-1)}\n\n/* ---------------- Tags / badges ---------------- */\n.tagrow{display:flex;gap:6px;flex-wrap:wrap}\n.itag{border-radius:var(--r-pill);padding:5px 10px;font-size:11px;font-weight:500;white-space:nowrap;\n  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--cb-line);color:var(--cb-text-2);background:var(--cb-surface-2)}\n.itag.me{background:var(--cb-yellow);color:var(--cb-on-yellow);border-color:var(--cb-yellow);font-weight:700}\n.itag.match{background:var(--cb-yellow-dim);border-color:var(--cb-yellow-line);color:var(--cb-yellow-2);font-weight:600}\n.itag.match::before{content:\"\";width:5px;height:5px;border-radius:50%;background:var(--cb-yellow)}\n.itag.muted{color:var(--cb-text-3);background:transparent;border-color:var(--cb-line)}\n.itag.dashed{border-style:dashed;color:var(--cb-text-2);background:transparent;cursor:pointer}\n.more{font-size:11px;color:var(--cb-text-3);font-weight:600;align-self:center}\n\n.match-badge{border-radius:var(--r-sm);padding:5px 9px;font-size:11px;font-weight:700;letter-spacing:.01em;\n  border:1px solid var(--cb-yellow-line);color:var(--cb-yellow-2);background:var(--cb-yellow-dim)}\n.match-badge.strong{background:var(--cb-yellow);color:var(--cb-on-yellow);border-color:var(--cb-yellow)}\n.full-tag{border-radius:var(--r-sm);padding:4px 9px;font-size:10.5px;font-weight:700;text-transform:uppercase;\n  letter-spacing:.04em;border:1px solid var(--cb-line-2);color:var(--cb-text-3);background:var(--cb-surface-2)}\n.prof-chip{font-size:10px;font-weight:600;color:var(--cb-text-3);border:1px solid var(--cb-line);\n  border-radius:var(--r-pill);padding:2px 7px;margin-left:6px;vertical-align:middle}\n\n/* ---------------- Buttons / CTA ---------------- */\n.cta-wrap{margin-top:auto;flex:0 0 auto;padding:12px 16px calc(12px + env(safe-area-inset-bottom));\n  background:linear-gradient(transparent,var(--cb-bg) 22%);border-top:1px solid var(--cb-line);position:relative}\n.btn{height:54px;border-radius:var(--r-md);width:100%;display:flex;align-items:center;justify-content:center;\n  gap:8px;font-size:15px;font-weight:700;cursor:pointer;border:0;transition:.15s}\n.btn.primary{background:var(--cb-yellow);color:var(--cb-on-yellow);box-shadow:var(--sh-glow)}\n.btn.primary:hover{background:var(--cb-yellow-2)}\n.btn.outline{background:var(--cb-surface-2);color:var(--cb-text);border:1px solid var(--cb-line-2)}\n.btn.disabled{background:var(--cb-surface-2);color:var(--cb-text-3);box-shadow:none;cursor:not-allowed}\n.btn .ic{width:18px;height:18px}\n.cta-hint{font-size:11px;color:var(--cb-text-3);text-align:center;margin-top:9px}\n\n/* ---------------- Bottom nav ---------------- */\n.bottomnav{height:64px;display:flex;flex:0 0 auto;background:rgba(14,14,16,.92);backdrop-filter:blur(12px);\n  border-top:1px solid var(--cb-line);padding-bottom:env(safe-area-inset-bottom)}\n.bottomnav .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;\n  font-size:10.5px;font-weight:600;color:var(--cb-text-3);cursor:pointer}\n.bottomnav .tab .ic{width:23px;height:23px}\n.bottomnav .tab.active{color:var(--cb-yellow)}\n\n/* ---------------- Forms ---------------- */\n.form{display:flex;flex-direction:column;gap:16px}\n.field{display:flex;flex-direction:column;gap:8px}\n.field>label{font-size:12.5px;color:var(--cb-text-2);font-weight:600}\n.field>label .opt{color:var(--cb-text-3);font-weight:400}\n.input{min-height:48px;border-radius:var(--r-md);background:var(--cb-surface-2);border:1px solid var(--cb-line);\n  padding:13px 14px;font-size:14px;color:var(--cb-text);display:flex;align-items:center;gap:8px}\n.input.placeholder{color:var(--cb-text-3)}\n.input.textarea{align-items:flex-start;min-height:74px;line-height:1.5}\n.input .muted{color:var(--cb-text-3);margin-left:auto}\n.count{text-align:right;font-size:11px;color:var(--cb-text-3)}\n.row-split{display:flex;gap:12px}.row-split>.field{flex:1}\n.row-between{min-height:48px;border-radius:var(--r-md);background:var(--cb-surface-2);border:1px solid var(--cb-line);\n  padding:0 14px;font-size:14px;display:flex;align-items:center;justify-content:space-between}\n.toggle{width:46px;height:28px;border-radius:var(--r-pill);background:var(--cb-surface-3);border:1px solid var(--cb-line-2);\n  position:relative;flex:0 0 auto;transition:.2s}\n.toggle::after{content:\"\";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s}\n.toggle.on{background:var(--cb-yellow);border-color:var(--cb-yellow)}\n.toggle.on::after{left:auto;right:2px;background:var(--cb-on-yellow)}\n.stepper{display:inline-flex;align-items:center;gap:4px;height:34px;border-radius:var(--r-pill);\n  background:var(--cb-surface-3);border:1px solid var(--cb-line);padding:0 4px}\n.stepper button{width:26px;height:26px;border-radius:50%;border:0;background:transparent;color:var(--cb-text);\n  font-size:17px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}\n.stepper .val{font-size:12px;font-weight:700;min-width:54px;text-align:center;color:var(--cb-text)}\n<\u002Fstyle>\n\n<style>\n/* ============================================================\n   CONCERT BUDDY — Component / screen styles (part 2)\n   ============================================================ */\n\n/* concert card (CB-03) */\n.concert-card{display:flex;gap:13px;background:var(--cb-surface-1);border:1px solid var(--cb-line);\n  border-radius:var(--r-lg);padding:12px;margin-bottom:12px;box-shadow:var(--sh-card);cursor:pointer;transition:.15s}\n.concert-card:hover{border-color:var(--cb-line-2)}\n.concert-card .ph{width:72px;height:72px;border-radius:var(--r-md)}\n.concert-card .info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px}\n.concert-card .name{font-size:15px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.concert-card .sub{font-size:12.5px;color:var(--cb-text-2)}\n.concert-card .meta{font-size:11.5px;color:var(--cb-text-3);margin-top:3px;display:flex;align-items:center;gap:6px}\n.concert-card .meta b{color:var(--cb-yellow);font-weight:700}\n\n/* trending tags (CB-03) */\n.trending{padding:14px 16px 2px;flex:0 0 auto}\n.trending .lab{font-size:10.5px;color:var(--cb-text-3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}\n.trending .tagrow{flex-wrap:nowrap;overflow-x:auto}\n\n/* room card (CB-04) */\n.room-card{background:var(--cb-surface-1);border:1px solid var(--cb-line);border-radius:var(--r-lg);\n  padding:14px;margin-bottom:12px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--sh-card);cursor:pointer;transition:.15s}\n.room-card:hover{border-color:var(--cb-line-2)}\n.room-card .top{display:flex;align-items:center;justify-content:space-between}\n.room-card .host{display:flex;align-items:center;gap:9px;min-width:0}\n.room-card .nick{font-size:13px;font-weight:600}\n.room-card .ttl{font-size:15px;font-weight:700;line-height:1.4;letter-spacing:-.01em;text-wrap:pretty}\n.room-card .footer{display:flex;align-items:center;justify-content:space-between;padding-top:2px}\n.room-card .meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cb-text-2)}\n.room-card .meta .ic{width:14px;height:14px;color:var(--cb-text-3)}\n.room-card .count{border-radius:var(--r-pill);padding:4px 11px;font-size:11.5px;font-weight:600;\n  border:1px solid var(--cb-line);color:var(--cb-text-2);background:var(--cb-surface-2)}\n.room-card.full{opacity:.5}\n\n/* lobby (CB-04) */\n.banner{height:140px;position:relative;flex:0 0 auto}\n.banner .ph{width:100%;height:100%}\n.banner::after{content:\"\";position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(8,8,9,.85))}\n.banner .overlay{position:absolute;left:16px;bottom:24px;z-index:2}\n.banner .overlay .nm{font-size:17px;font-weight:700;letter-spacing:-.01em}\n.banner .overlay .sub{font-size:12px;color:var(--cb-text-2);margin-top:3px;display:flex;align-items:center;gap:7px}\n.banner .overlay .dday{color:var(--cb-yellow);font-weight:700}\n.mytags{margin:-12px 16px 0;position:relative;z-index:3;background:var(--cb-surface-1);\n  border:1px solid var(--cb-yellow-line);border-radius:var(--r-md);padding:13px 14px;\n  display:flex;flex-direction:column;gap:10px;box-shadow:var(--sh-card)}\n.mytags .ti{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:600}\n.mytags .edit{font-size:12px;color:var(--cb-yellow);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}\n.filterrow{display:flex;gap:8px;padding:14px 16px 6px;overflow-x:auto;flex:0 0 auto}\n.filter-pill{height:32px;border-radius:var(--r-pill);padding:0 13px;font-size:12px;font-weight:600;\n  border:1px solid var(--cb-line);color:var(--cb-text-2);background:var(--cb-surface-2);\n  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex:0 0 auto;cursor:pointer}\n.filter-pill.active{background:var(--cb-yellow);color:var(--cb-on-yellow);border-color:var(--cb-yellow)}\n.filter-pill .ic{width:12px;height:12px}\n\n/* FAB */\n.fab{position:absolute;right:18px;bottom:84px;width:58px;height:58px;border-radius:50%;background:var(--cb-yellow);\n  color:var(--cb-on-yellow);display:flex;align-items:center;justify-content:center;z-index:20;\n  box-shadow:0 12px 28px -8px rgba(253,190,13,.6);cursor:pointer}\n.fab .ic{width:26px;height:26px;stroke-width:2.4}\n\n/* approval banner (CB-05) */\n.note-banner{margin:12px 16px 0;padding:12px 14px;border-radius:var(--r-md);background:var(--cb-yellow-dim);\n  border:1px solid var(--cb-yellow-line);font-size:12px;color:var(--cb-yellow-2);line-height:1.5;\n  display:flex;gap:10px;align-items:flex-start;flex:0 0 auto}\n.note-banner .ic{width:17px;height:17px;color:var(--cb-yellow);flex:0 0 auto;margin-top:1px}\n.note-banner b{color:var(--cb-yellow);font-weight:700}\n\n/* My Rooms (CB-06) */\n.pillrow{display:flex;gap:8px;padding:14px 16px 4px;overflow-x:auto;flex:0 0 auto}\n.pillrow .pill{height:34px;padding:0 14px;border-radius:var(--r-pill);border:1px solid var(--cb-line);\n  background:var(--cb-surface-2);font-size:12.5px;font-weight:600;color:var(--cb-text-2);\n  display:inline-flex;align-items:center;gap:7px;white-space:nowrap;cursor:pointer}\n.pillrow .pill.active{background:var(--cb-yellow);color:var(--cb-on-yellow);border-color:var(--cb-yellow)}\n.pillrow .pill .num{font-size:10px;font-weight:800;background:var(--cb-on-yellow);color:var(--cb-yellow);\n  border-radius:var(--r-pill);padding:1px 6px}\n.pillrow .pill:not(.active) .num{background:var(--cb-yellow);color:var(--cb-on-yellow)}\n.myroom-card{margin:0 16px 12px;background:var(--cb-surface-1);border:1px solid var(--cb-line);border-radius:var(--r-lg);\n  padding:12px;display:flex;gap:12px;position:relative;box-shadow:var(--sh-card);cursor:pointer}\n.myroom-card .ph{width:60px;height:60px;border-radius:var(--r-md)}\n.myroom-card .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}\n.myroom-card .name{font-size:14px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:42px}\n.myroom-card .sub{font-size:11.5px;color:var(--cb-text-3)}\n.myroom-card .meet{font-size:12px;color:var(--cb-text-2);margin-top:5px;display:flex;align-items:center;gap:6px}\n.myroom-card .meet .ic{width:13px;height:13px;color:var(--cb-text-3)}\n.myroom-card .footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:8px}\n.myroom-card .members-c{display:flex;gap:8px;align-items:center;font-size:11.5px;color:var(--cb-text-3)}\n.myroom-card.pending .name,.myroom-card.past .name{color:var(--cb-text-2)}\n.myroom-card.past{opacity:.62}\n.countdown{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;color:var(--cb-yellow);\n  background:var(--cb-yellow-dim);border:1px solid var(--cb-yellow-line);padding:3px 8px;border-radius:var(--r-sm)}\n.role-badge{border-radius:var(--r-sm);padding:3px 8px;font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}\n.role-badge.host{background:var(--cb-yellow);color:var(--cb-on-yellow)}\n.role-badge.member{border:1px solid var(--cb-yellow-line);color:var(--cb-yellow-2);background:var(--cb-yellow-dim)}\n.role-badge.pending{border:1px solid var(--cb-line-2);color:var(--cb-text-2)}\n.role-badge.past{border:1px solid var(--cb-line);color:var(--cb-text-3)}\n.pending-pill{background:var(--cb-yellow);color:var(--cb-on-yellow);border-radius:var(--r-pill);padding:3px 9px;font-size:10.5px;font-weight:800}\n\n/* Login (CB-01) */\n.login{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 24px;text-align:center}\n.login .logo{margin-top:118px;width:96px;height:96px;border-radius:26px;background-size:cover;\n  box-shadow:0 18px 50px -14px rgba(253,190,13,.55)}\n.login .app-name{margin-top:22px;font-size:28px;font-weight:800;letter-spacing:-.02em}\n.login .tagline{margin-top:8px;font-size:14px;color:var(--cb-text-2);line-height:1.55}\n.login .spacer{flex:1}\n.login .actions{width:100%;display:flex;flex-direction:column;gap:12px;padding-bottom:34px}\n.login .terms{font-size:11px;color:var(--cb-text-3);line-height:1.5;margin-bottom:6px}\n.login .demo{font-size:13px;color:var(--cb-text-2);background:none;border:0;text-decoration:underline;\n  text-underline-offset:3px;padding:8px;cursor:pointer}\n.btn-kakao{height:54px;border-radius:var(--r-md);background:#FEE500;color:#191600;border:0;font-size:15px;font-weight:700;\n  display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer}\n.btn-kakao .ic{width:19px;height:19px;color:#191600}\n\n/* Nickname (CB-02) */\n.pad{padding:8px 16px 0;display:flex;flex-direction:column;flex:1}\n.head-h1{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1.35}\n.head-h1 small{display:block;font-size:13.5px;color:var(--cb-text-2);font-weight:400;margin-top:8px;letter-spacing:0}\n.sub-lbl{font-size:12.5px;font-weight:600;color:var(--cb-text-2);margin-bottom:9px}\n.sub-lbl .opt{color:var(--cb-text-3);font-weight:400}\nbutton.chip{font-family:var(--font);appearance:none}\n.sub-lbl .req{display:inline-flex;align-items:center;margin-left:6px;padding:2px 7px;border-radius:var(--r-pill);background:var(--cb-yellow-dim);border:1px solid var(--cb-yellow-line);color:var(--cb-yellow);font-size:10px;font-weight:700}\n.cb02-pad{padding-top:10px}\n.cb02-input{width:100%;font-family:var(--font);outline:0;display:block}\n.cb02-input::placeholder{color:var(--cb-text-3)}\n.cb02-input:focus{border-color:var(--cb-yellow-line);box-shadow:0 0 0 3px rgba(253,190,13,.09)}\n.cb02-meta{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-top:1px}\n.cb02-helper{flex:1;margin:0}\n.cb02-helper.ok{color:var(--cb-yellow-2)}\n.cb02-helper.err{color:var(--cb-danger)}\n.cb02-bottom-note{padding:12px 13px;border-radius:var(--r-md);background:var(--cb-surface-1);border:1px solid var(--cb-line)}\n#cb02-submit:not(:disabled){background:var(--cb-yellow);color:var(--cb-on-yellow);box-shadow:var(--sh-glow);cursor:pointer}\n#cb02-submit:disabled{background:var(--cb-surface-2);color:var(--cb-text-3);box-shadow:none;cursor:not-allowed}\n\n/* Profile (CB-14) */\n.profile{flex:1 1 auto;overflow:auto;display:flex;flex-direction:column;padding:8px 16px 18px}\n.profile-summary{display:flex;align-items:center;gap:14px;padding:16px;background:var(--cb-surface-1);\n  border:1px solid var(--cb-line);border-radius:var(--r-lg);cursor:pointer;box-shadow:var(--sh-card)}\n.profile-summary .meta .nm{font-size:17px;font-weight:700;letter-spacing:-.01em}\n.profile-summary .meta .d1{font-size:12.5px;color:var(--cb-text-2);margin-top:4px}\n.profile-summary .meta .d2{font-size:11px;color:var(--cb-text-3);margin-top:2px}\n.profile-summary .chev{margin-left:auto;color:var(--cb-text-3)}\n.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}\n.stat{background:var(--cb-surface-1);border:1px solid var(--cb-line);border-radius:var(--r-md);padding:14px 8px;text-align:center}\n.stat .n{font-size:20px;font-weight:800;color:var(--cb-yellow)}\n.stat .l{font-size:11px;color:var(--cb-text-2);margin-top:4px}\n.menu-group{margin-top:22px}\n.menu-group .gl{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cb-text-3);margin-bottom:6px}\n.menu-row{display:flex;align-items:center;justify-content:space-between;padding:15px 4px;\n  border-bottom:1px solid var(--cb-line);font-size:14px;cursor:pointer}\n.menu-row .rk{color:var(--cb-text-3);font-size:13px;display:flex;align-items:center;gap:6px}\n.menu-row .rk .ic{width:16px;height:16px}\n.avatar-edit{align-self:center;position:relative;width:104px;height:104px;margin:6px 0}\n.avatar-edit .circle{width:104px;height:104px;border-radius:50%;background:var(--cb-surface-3);border:1px solid var(--cb-line-2);\n  display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:var(--cb-text-2)}\n.avatar-edit .cam{position:absolute;right:0;bottom:0;width:34px;height:34px;border-radius:50%;background:var(--cb-yellow);\n  color:var(--cb-on-yellow);border:3px solid var(--cb-bg);display:flex;align-items:center;justify-content:center}\n.avatar-edit .cam .ic{width:16px;height:16px;stroke-width:2}\n.avatar-edit-label{align-self:center;font-size:12px;color:var(--cb-yellow);font-weight:600;margin:4px 0 18px;cursor:pointer}\n\n/* Room detail (CB-07) */\n.rd-banner{height:130px;position:relative;flex:0 0 auto}\n.rd-banner .ph{width:100%;height:100%}\n.rd-banner::after{content:\"\";position:absolute;inset:0;background:linear-gradient(transparent 25%,rgba(8,8,9,.9))}\n.rd-banner .overlay{position:absolute;left:16px;bottom:14px;z-index:2;font-size:15px;font-weight:700}\n.rd-banner .overlay .d{font-size:11.5px;color:var(--cb-text-2);font-weight:400;margin-top:3px}\n.rd-banner .overlay .d b{color:var(--cb-yellow);font-weight:700}\n.role-pill{position:absolute;top:14px;right:14px;z-index:2;border-radius:var(--r-pill);padding:5px 12px;\n  font-size:10.5px;font-weight:800;letter-spacing:.05em;border:1px solid var(--cb-line-2);\n  color:var(--cb-text);background:rgba(20,20,22,.7);backdrop-filter:blur(6px)}\n.role-pill.host{background:var(--cb-yellow);color:var(--cb-on-yellow);border-color:var(--cb-yellow)}\n.role-pill.member{border-color:var(--cb-yellow-line);color:var(--cb-yellow-2)}\n.role-pill.pending{border-style:dashed;color:var(--cb-text-2)}\n.state-strip{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;\n  background:var(--cb-surface-1);border-bottom:1px solid var(--cb-line);flex:0 0 auto;font-size:12.5px}\n.state-strip .l{display:flex;align-items:center;gap:9px;font-weight:600}\n.state-strip .l .sdot{width:8px;height:8px;border-radius:50%;background:var(--cb-yellow)}\n.state-strip .l .sdot.pending{background:transparent;border:1.5px dashed var(--cb-yellow)}\n.state-strip .l .sdot.muted{background:var(--cb-text-3)}\n.state-strip .r{font-size:11.5px;color:var(--cb-text-3)}\n.room-info{padding:16px}\n.room-info .ttl{font-size:18px;font-weight:800;letter-spacing:  state.gender;\n      submit.disabled = !valid;\n      submit.setAttribute('aria-disabled', valid ? 'false' : 'true');\n      submit.classList.toggle('primary', !!valid);\n      submit.classList.toggle('disabled', !valid);\n      if (ctaHint) ctaHint.textContent = valid ? '입력한 정보로 Concert Buddy를 시작해요.' : '닉네임, 연령대, 성별을 모두 입력해 주세요.';\n    }\n    function updateNickname(){\n      var next = clean(input.value);\n      if (next !== input.value) input.value = next;\n      var len = charLen(input.value);\n      count.textContent = len + ' / 12';\n      helper.classList.remove('ok', 'err');\n      if (len === 0) {\n        helper.textContent = '한글·영문·숫자·_ 만 가능. 2 ~ 12자.';\n      } else if (len < 2) {\n        helper.textContent = '2자 이상 입력해 주세요.';\n        helper.classList.add('err');\n      } else {\n        helper.textContent = '사용 가능한 닉네임 형식이에요.';\n        helper.classList.add('ok');\n      }\n      updateSubmit();\n    }\n    function bindGroup(chips, key){\n      chips.forEach(function(chip){\n        chip.addEventListener('click', function(){\n          state[key] = chip.textContent.trim();\n          chips.forEach(function(item){\n            var on = item === chip;\n            item.classList.toggle('active', on);\n            item.setAttribute('aria-pressed', on ? 'true' : 'false');\n          });\n          updateSubmit();\n        });\n      });\n    }\n\n    input.addEventListener('input', updateNickname);\n    bindGroup(ageChips, 'age');\n    bindGroup(genderChips, 'gender');\n    updateNickname();\n  }\n  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initCb02);\n  else initCb02();\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
